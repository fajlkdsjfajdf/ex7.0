<!-- 搜索弹窗组件 -->
<div class="search-modal" id="searchModal">
    <span class="close-search" id="closeSearch"><i class="fas fa-times"></i></span>

    <div class="search-container">
        <!-- 搜索框区域 -->
        <div class="search-header">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索漫画标题、作者...">
            <button class="search-button" id="searchButton">
                <i class="fas fa-search"></i> 搜索
            </button>
        </div>

        <!-- 搜索模式选择 -->
        <div class="search-mode-selector">
            <div class="search-mode-title">搜索模式：</div>
            <div class="btn-group" id="searchModeGroup">
                <button class="btn-group-item" data-value="exact">
                    <i class="fas fa-crosshairs"></i> 精准
                </button>
                <button class="btn-group-item" data-value="vector">
                    <i class="fas fa-brain"></i> 向量
                </button>
                <button class="btn-group-item active" data-value="all">
                    <i class="fas fa-search"></i> 混合
                </button>
            </div>
            <div class="search-mode-hint" id="searchModeHint">
                结合精准匹配和智能搜索，结果更全面
            </div>
        </div>

        <!-- 已选标签区域 -->
        <div class="selected-tags" id="selectedTags"></div>

        <!-- 标签搜索区域 -->
        <div class="tag-search-container">
            <input type="text" class="tag-search-input" id="tagSearchInput" placeholder="搜索标签...">
            <div class="tag-suggestions" id="tagSuggestions"></div>
        </div>

        <!-- 标签分类区域 -->
        <div class="tag-categories" id="tagCategories"></div>
    </div>
</div>
